receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  memory_limiter:
    check_interval: 1s
    limit_mib: 1000

exporters:
  logging:
    verbosity: detailed
  
  # Vendor exporters ready for API keys 
  otlphttp/axiom:
    endpoint: "https://api.axiom.co/v1/traces"
    headers:
      Authorization: "Bearer ${env:AXIOM_TOKEN}"
      X-Axiom-Dataset: "${env:AXIOM_DATASET}"

  otlphttp/newrelic:
    endpoint: "https://otlp.nr-data.net:4318"
    headers:
      api-key: "${env:NEW_RELIC_LICENSE_KEY}"

  otlp/sentry:
    endpoint: "ingest.sentry.io:4317"
    headers:
      Authorization: "DSN ${env:SENTRY_DSN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging] 
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
